<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJECT NULL — AI Development & Automation</title>
    <meta name="description" content="AI開発・業務自動化のPROJECT NULL。NULLの演算能力で圧倒的な開発速度を実現します。">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700;900&family=Rajdhani:wght@500;600;700&display=swap"
        rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { n: { black: '#050505', dark: '#0a0a0a', neon: '#00f3ff', alert: '#ff003c', success: '#00ff41' } },
                    fontFamily: { sans: ['"Noto Sans JP"', 'sans-serif'], display: ['"Rajdhani"', 'sans-serif'], mono: ['"Courier New"', 'Courier', 'monospace'] },
                }
            }
        }
    </script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <style>
        :root {
            --bg: #050505;
            --accent: #00f3ff;
            --accent-glow: rgba(0, 243, 255, 0.4);
            --text-main: #e8e8e8;
            --text-dim: #777;
            --panel-bg: rgba(12, 12, 12, 0.9);
            --border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: "Noto Sans JP", sans-serif;
            overflow-x: hidden;
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }

        ::selection {
            background: var(--accent);
            color: #000;
        }

        /* --- Design System --- */
        .glass {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
        }

        .accent-border {
            border: 1px solid var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        /* --- Boot Loader --- */
        #fl {
            position: fixed;
            inset: 0;
            z-index: 10001;
            background: #000;
            color: #00ff41;
            font-family: monospace;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            transition: opacity 0.6s, visibility 0.6s;
            font-size: 13px;
        }

        #fl.done {
            opacity: 0;
            visibility: hidden;
        }

        /* --- CRT --- */
        #crt {
            position: fixed;
            inset: 0;
            z-index: 10000;
            pointer-events: none;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, .06) 50%);
            background-size: 100% 4px;
            opacity: 0.15;
        }

        /* --- Floating Particles BG --- */
        #particles-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* --- Glow Orbs (ambient) --- */
        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.07;
            pointer-events: none;
        }

        /* --- Section divider --- */
        .section-glow {
            height: 1px;
            width: 100%;
            position: relative;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.3;
        }

        /* --- Slide --- */
        .slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .slide.active {
            opacity: 1;
        }

        /* --- 3D Tilt Card --- */
        .tilt-card {
            transform-style: preserve-3d;
            perspective: 1000px;
            transition: transform 0.15s ease-out, box-shadow 0.3s;
        }

        .tilt-card:hover {
            box-shadow: 0 20px 60px rgba(0, 243, 255, 0.12);
        }

        /* --- Hover glow on interactive --- */
        .btn-glow {
            position: relative;
            overflow: hidden;
        }

        .btn-glow::after {
            content: '';
            position: absolute;
            inset: -50%;
            background: radial-gradient(circle, rgba(0, 243, 255, 0.15) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .btn-glow:hover::after {
            opacity: 1;
        }

        /* --- Terminal --- */
        .tp-full {
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: #000;
            font-family: monospace;
            color: #00ff41;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .tp-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0a0a0a;
            padding: 12px 24px;
            border-bottom: 1px solid #00ff41;
        }

        .tp-header button {
            background: none;
            border: 1px solid #ff003c;
            color: #ff003c;
            padding: 6px 16px;
            cursor: pointer;
            font-weight: bold;
            font-family: monospace;
            transition: all 0.2s;
        }

        .tp-header button:hover {
            background: #ff003c;
            color: #000;
        }

        .tga-full {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.95);
        }

        .ti-full {
            display: flex;
            border-top: 1px solid #00ff41;
            background: #050505;
            padding: 10px;
        }

        .ti-full span {
            padding: 10px;
            color: #00ff41;
            font-size: 20px;
            font-weight: bold;
        }

        .ti-full input {
            flex: 1;
            background: transparent;
            border: none;
            color: #00ff41;
            font-family: monospace;
            font-size: 20px;
            outline: none;
            padding: 10px;
        }

        .fw-full {
            position: absolute;
            font-size: 28px;
            font-weight: 900;
            white-space: nowrap;
            text-shadow: 0 0 12px #00ff41;
            letter-spacing: 0.1em;
        }

        @keyframes wfall {
            0% {
                top: -50px;
            }

            100% {
                top: calc(100% + 50px);
            }
        }

        /* --- Pulse ring animation --- */
        @keyframes pulse-ring {
            0% {
                transform: scale(1);
                opacity: 0.4;
            }

            100% {
                transform: scale(2.5);
                opacity: 0;
            }
        }

        .pulse-ring::before {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            animation: pulse-ring 2s ease-out infinite;
        }

        /* --- Scrollbar --- */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 243, 255, 0.3);
            border-radius: 2px;
        }

        /* --- Smooth scroll --- */
        html {
            scroll-behavior: smooth;
        }
    </style>
</head>

    <canvas id="particles-canvas"></canvas>
    <div id="crt"></div>
    <div id="fl"></div>
    <div id="root"></div>

    <script>
            /* ======================================== */
            /* === PARTICLE BACKGROUND (Canvas) === */
            /* ======================================== */
            (function () {
                var canvas = document.getElementById('particles-canvas');
                var ctx = canvas.getContext('2d');
                var particles = [];
                var mouse = { x: -999, y: -999 };
                var W, H;

                function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
                resize();
                window.addEventListener('resize', resize);
                document.addEventListener('mousemove', function (ev) { mouse.x = ev.clientX; mouse.y = ev.clientY; });

                for (var i = 0; i < 60; i++) {
                    particles.push({
                        x: Math.random() * W, y: Math.random() * H,
                        vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3,
                        r: 1 + Math.random() * 1.5, a: 0.1 + Math.random() * 0.2
                    });
                }

                function draw() {
                    ctx.clearRect(0, 0, W, H);
                    for (var i = 0; i < particles.length; i++) {
                        var p = particles[i];
                        p.x += p.vx; p.y += p.vy;
                        if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
                        if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;

                        /* Glow near mouse */
                        var dx = p.x - mouse.x, dy = p.y - mouse.y;
                        var dist = Math.sqrt(dx * dx + dy * dy);
                        var alpha = dist < 200 ? p.a + (1 - dist / 200) * 0.5 : p.a;

                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                        ctx.fillStyle = 'rgba(0,243,255,' + alpha + ')';
                        ctx.fill();

                        /* Connect lines to nearby */
                        for (var j = i + 1; j < particles.length; j++) {
                            var p2 = particles[j];
                            var d = Math.sqrt((p.x - p2.x) * (p.x - p2.x) + (p.y - p2.y) * (p.y - p2.y));
                            if (d < 120) {
                                ctx.beginPath();
                                ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y);
                                ctx.strokeStyle = 'rgba(0,243,255,' + (0.06 * (1 - d / 120)) + ')';
                                ctx.stroke();
                            }
                        }
                    }
                    requestAnimationFrame(draw);
                }
                draw();
            })();

        /* ======================================== */

                if (!actx) return;
                var osc = actx.createOscillator();
                var gain = actx.createGain();
                osc.type = type || 'sine';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(vol || 0.06, actx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + (dur || 0.15));
                osc.connect(gain); gain.connect(actx.destination);
                osc.start(); osc.stop(actx.currentTime + (dur || 0.15));
            }

            return {

                click: function () { play(800, 0.1, 'square', 0.05); play(1600, 0.15, 'sine', 0.03); },

                error: function () { play(200, 0.3, 'sawtooth', 0.06); },
                type: function () { play(600 + Math.random() * 400, 0.04, 'square', 0.02); }

        /* === Section Divider === */

        /* === Typewriter === */
        function TW(props) {

        /* ============================== */
        /* ===== HERO ===== */
        /* ============================== */
        var heroSlides = [IMG.faceClose, IMG.maidFull, IMG.windowRain, IMG.ex08];
        function HeroSection() {
            var _i = useState(0); var idx = _i[0]; var setIdx = _i[1];
            useEffect(function () {

                e(GlowOrbs, { t: '30%', l: '5%' }),
                /* Grid */
                e('div', { className: 'absolute inset-0 opacity-[0.03]', style: { backgroundImage: 'linear-gradient(rgba(255,255,255,.1) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.1) 1px, transparent 1px)', backgroundSize: '60px 60px' } }),
                e('div', { className: 'container mx-auto px-6 md:px-12 relative z-10 grid grid-cols-1 lg:grid-cols-2 gap-16 items-center py-32' },
                    /* Text */
                    e(motion.div, { className: 'space-y-8', initial: { opacity: 0, y: 40 }, animate: { opacity: 1, y: 0 }, transition: { duration: 1 } },
                        e('div', { className: 'inline-block px-4 py-1.5 border border-n-neon/30 text-n-neon text-xs font-display tracking-widest rounded-full' }, 'AI DEVELOPMENT STUDIO'),
                        e('h1', { className: 'font-display text-5xl sm:text-6xl md:text-8xl font-black leading-[0.9] tracking-tight' },
                            e(TW, { text: 'PROJECT', speed: 80 }),

                        )

                    e('span', { className: 'font-mono text-[10px] tracking-widest' }, 'SCROLL'),

        }

        /* ============================== */
        /* ===== STATS BAR ===== */
        /* ============================== */
        function StatsBar() {
            var stats = [
                { label: 'Projects Delivered', val: 50, suffix: '+' },
                { label: 'Dev Speed', val: 10, suffix: 'x' },
                { label: 'Cost Reduction', val: 80, suffix: '%' },
                { label: 'Client Satisfaction', val: 98, suffix: '%' },
            ];
            return e('section', { className: 'py-16 px-6 relative overflow-hidden' },
                e(GlowOrbs, { t: '50%', l: '80%', b: '50%', r: '80%' }),

                    stats.map(function (s, i) {
                        return e(motion.div, {
                            key: i, className: 'space-y-2',
                            initial: { opacity: 0, y: 20 }, whileInView: { opacity: 1, y: 0 }, viewport: { once: true }, transition: { delay: i * 0.1 }

                            e('div', { className: 'font-display text-4xl md:text-5xl font-black text-n-neon' }, e(Counter, { to: s.val, suffix: s.suffix })),

        }

        /* ============================== */
