        tailwind.config = {

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>

    <style>
        :root {
            --bg: #030303;
            --accent: #00f3ff;
            --accent-glow: rgba(0, 243, 255, 0.5);
            --accent-soft: rgba(0, 243, 255, 0.15);
            --alert: #ff003c;
            --alert-glow: rgba(255, 0, 60, 0.4);
            --text-main: #f0f0f0;
            --text-dim: #888;
            --panel-bg: rgba(10, 10, 10, 0.85);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: "Noto Sans JP", sans-serif;
            overflow-x: hidden;
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
            cursor: none;
        }

        a, button, input {
            cursor: none;
        }

        /* --- Custom Cursor --- */
        #custom-cursor {
            position: fixed; top: 0; left: 0; width: 6px; height: 6px;
            background: var(--accent); border-radius: 50%;
            pointer-events: none; z-index: 100000;
            box-shadow: 0 0 10px var(--accent);
            transition: transform 0.1s, background 0.3s;
        }
        #custom-cursor-ring {
            position: fixed; top: 0; left: 0; width: 36px; height: 36px;
            border: 1px solid var(--accent-glow); border-radius: 50%;
            pointer-events: none; z-index: 99999;
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s, background 0.2s, border-color 0.2s;
        }
        body.hovering #custom-cursor { transform: scale(1.5); background: var(--alert); box-shadow: 0 0 15px var(--alert); }
        body.hovering #custom-cursor-ring { width: 50px; height: 50px; border-color: var(--alert-glow); background: rgba(255,0,60,0.1); }

        ::selection {
            background: var(--accent);
            color: #000;
        }

        /* --- Design System --- */
        .glass {
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .accent-border {
            border: 1px solid var(--accent);
            box-shadow: 0 0 25px var(--accent-glow), inset 0 0 10px var(--accent-soft);
        }

        .text-glow {
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .alert-glow {
            text-shadow: 0 0 10px var(--alert-glow);
        }

        /* --- Boot Loader --- */
        #fl {
            position: fixed;
            inset: 0;
            z-index: 10001;
            background: #000;
            color: #00ff41;
            font-family: monospace;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            transition: opacity 0.6s, visibility 0.6s;
            font-size: 13px;
        }

        #fl.done {
            opacity: 0;
            visibility: hidden;
        }

        /* --- CRT --- */
        #crt {
            position: fixed;
            inset: 0;
            z-index: 10000;
            pointer-events: none;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0,0,0,0.1) 50%);
            background-size: 100% 4px;
            opacity: 0.15;
        }

        /* --- Scanline Animation --- */
        .scanline {
            position: fixed;
            inset: 0;
            background: linear-gradient(0deg, transparent 0%, rgba(0, 243, 255, 0.05) 50%, transparent 100%);
            background-size: 100% 200px;
            z-index: 9999;
            pointer-events: none;
            animation: scanline 8s linear infinite;
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        /* --- Mouse Trace Canvas --- */
        #trace-canvas {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* --- Video Background (Removed global, shifted to component) --- */

        /* --- Floating Particles BG --- */
        #particles-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* --- Glow Orbs (ambient) --- */
        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.07;
            pointer-events: none;
        }

        /* --- Section divider --- */
        .section-glow {
            height: 1px;
            width: 100%;
            position: relative;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.3;
        }

        /* --- Slide --- */
        .slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .slide.active {
            opacity: 1;
        }

        /* --- 3D Tilt Card --- */
        .tilt-card {
            transform-style: preserve-3d;
            perspective: 1000px;
            transition: transform 0.15s ease-out, box-shadow 0.3s;
        }

        .tilt-card:hover {
            box-shadow: 0 20px 80px rgba(0, 243, 255, 0.25), inset 0 0 20px var(--accent-soft);
        }

        /* --- Hover glow on interactive --- */
        .btn-glow {
            position: relative;
            overflow: hidden;
        }

        .btn-glow::after {
            content: '';
            position: absolute;
            inset: -50%;
            background: radial-gradient(circle, rgba(0, 243, 255, 0.15) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .btn-glow:hover::after {
            opacity: 1;
        }

        /* --- Terminal --- */
        .tp-full {
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: #000;
            font-family: monospace;
            color: #00ff41;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .tp-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0a0a0a;
            padding: 12px 24px;
            border-bottom: 1px solid #00ff41;
        }

        .tp-header button {
            background: none;
            border: 1px solid #ff003c;
            color: #ff003c;
            padding: 6px 16px;
            cursor: pointer;
            font-weight: bold;
            font-family: monospace;
            transition: all 0.2s;
        }

        .tp-header button:hover {
            background: #ff003c;
            color: #000;
        }

        .tga-full {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.95);
        }

        .ti-full {
            display: flex;
            border-top: 1px solid #00ff41;
            background: #050505;
            padding: 10px;
        }

        .ti-full span {
            padding: 10px;
            color: #00ff41;
            font-size: 20px;
            font-weight: bold;
        }

        .ti-full input {
            flex: 1;
            background: transparent;
            border: none;
            color: #00ff41;
            font-family: monospace;
            font-size: 20px;
            outline: none;
            padding: 10px;
        }

        .fw-full {
            position: absolute;
            font-size: 28px;
            font-weight: 900;
            white-space: nowrap;
            text-shadow: 0 0 12px #00ff41;
            letter-spacing: 0.1em;
        }

        @keyframes wfall {
            0% {
                top: -50px;
            }

            100% {
                top: calc(100% + 50px);
            }
        }

        /* --- Pulse ring animation --- */
        @keyframes pulse-ring {
            0% {
                transform: scale(1);
                opacity: 0.4;
            }

            100% {
                transform: scale(2.5);
                opacity: 0;
            }
        }

        .pulse-ring::before {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            animation: pulse-ring 2s ease-out infinite;
        }

        /* --- Scrollbar --- */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 243, 255, 0.3);
            border-radius: 2px;
        }

        /* --- Glitch --- */
        @keyframes glitch {
            0% { clip: rect(44px, 9999px, 56px, 0); transform: skew(0.3deg); }
            5% { clip: rect(70px, 9999px, 20px, 0); transform: skew(0.5deg); }
            10% { clip: rect(12px, 9999px, 90px, 0); transform: skew(0.2deg); }
            15% { clip: rect(85px, 9999px, 10px, 0); transform: skew(0.4deg); }
            20% { clip: rect(33px, 9999px, 76px, 0); transform: skew(0.1deg); }
            100% { clip: rect(44px, 9999px, 56px, 0); transform: skew(0.3deg); }
        }

        .glitch-hover:hover {
            animation: glitch 0.3s steps(2, start) infinite;
            text-shadow: 2px 0 var(--accent), -2px 0 var(--alert);
        }

        /* --- video section (redesigned) --- */
        .video-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 4px;
            overflow: hidden;
        }
        .video-container iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
        }
        .video-overlay {
            position: absolute;
            inset: 0;
            background:
                linear-gradient(0deg, rgba(0,0,0,0.7) 0%, transparent 30%, transparent 70%, rgba(0,0,0,0.4) 100%),
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,243,255,0.02) 2px, rgba(0,243,255,0.02) 4px);
            pointer-events: none;
        }
        /* Holographic border */
        @keyframes holo-border {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .cm-wrapper {
            position: relative;
            padding: 2px;
            border-radius: 6px;
            background: linear-gradient(135deg, var(--accent), #6366f1, var(--alert), var(--accent));
            background-size: 300% 300%;
            animation: holo-border 6s ease infinite;
        }
        .cm-wrapper .video-container {
            border-radius: 4px;
        }
        /* Boot screen */
        .cm-boot {
            position: absolute; inset: 0; z-index: 20;
            background: radial-gradient(ellipse at center, #0d0d1a 0%, #030308 100%);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 24px; cursor: pointer;
        }
        .cm-boot::before {
            content: '';
            position: absolute; inset: 0;
            background:
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,243,255,0.015) 2px, rgba(0,243,255,0.015) 4px),
                radial-gradient(circle at 50% 50%, rgba(0,243,255,0.04) 0%, transparent 70%);
            pointer-events: none;
        }
        @keyframes cm-pulse { 0%,100%{opacity:0.3;} 50%{opacity:0.8;} }
        @keyframes cm-ring { 0%{transform:scale(1);opacity:0.6;} 100%{transform:scale(2.5);opacity:0;} }
        @keyframes cm-float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
        @keyframes cm-data { 0%{transform:translateY(-100%);opacity:0.5} 100%{transform:translateY(100vh);opacity:0} }
        .cm-play-btn {
            position: relative; width: 80px; height: 80px;
            border: 2px solid var(--accent);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,243,255,0.05);
            transition: all 0.4s cubic-bezier(.4,0,.2,1);
            animation: cm-float 3s ease-in-out infinite;
        }
        .cm-play-btn::before {
            content: '';
            position: absolute; inset: -8px; border-radius: 50%;
            border: 1px solid rgba(0,243,255,0.3);
            animation: cm-ring 2.5s ease-out infinite;
        }
        .cm-play-btn::after {
            content: '';
            position: absolute; inset: -16px; border-radius: 50%;
            border: 1px solid rgba(0,243,255,0.15);
            animation: cm-ring 2.5s ease-out infinite 0.5s;
        }
        .cm-play-btn:hover, .cm-boot:hover .cm-play-btn {
            background: rgba(0,243,255,0.15);
            box-shadow: 0 0 40px rgba(0,243,255,0.3), 0 0 80px rgba(0,243,255,0.1);
            transform: scale(1.1);
            animation: none;
        }
        .cm-play-icon {
            width: 0; height: 0;
            border-top: 14px solid transparent;
            border-bottom: 14px solid transparent;
            border-left: 22px solid var(--accent);
            margin-left: 4px;
            filter: drop-shadow(0 0 8px var(--accent));
        }
        .cm-label {
            font-family: 'Rajdhani', sans-serif;
            font-size: 11px; font-weight: 600;
            letter-spacing: 0.4em;
            color: rgba(0,243,255,0.5);
            text-transform: uppercase;
        }
        .cm-boot-line {
            font-family: monospace;
            font-size: 9px;
            color: rgba(0,243,255,0.2);
            letter-spacing: 0.15em;
            animation: cm-pulse 3s ease-in-out infinite;
        }
        /* data streams */
        .cm-data-col {
            position: absolute; top: 0; width: 1px; height: 100%;
            pointer-events: none;
        }
        .cm-data-col::before {
            content: '';
            position: absolute; top: 0; left: 0;
            width: 1px; height: 40px;
            background: linear-gradient(180deg, transparent, var(--accent), transparent);
            animation: cm-data var(--dur, 4s) linear infinite;
            animation-delay: var(--delay, 0s);
            opacity: 0.15;
        }
        /* corner decorations */
        .cm-corner {
            position: absolute; width: 16px; height: 16px;
            border-color: var(--accent); border-style: solid;
            opacity: 0.4; z-index: 25; pointer-events: none;
        }
        .cm-corner-tl { top: 8px; left: 8px; border-width: 1px 0 0 1px; }
        .cm-corner-tr { top: 8px; right: 8px; border-width: 1px 1px 0 0; }
        .cm-corner-bl { bottom: 8px; left: 8px; border-width: 0 0 1px 1px; }
        .cm-corner-br { bottom: 8px; right: 8px; border-width: 0 1px 1px 0; }
        /* Glitch transition */
        @keyframes cm-glitch-in {
            0% { clip-path: inset(0 100% 0 0); filter: hue-rotate(0deg); }
            20% { clip-path: inset(30% 0 40% 0); filter: hue-rotate(90deg); }
            40% { clip-path: inset(60% 20% 0 30%); filter: hue-rotate(180deg); }
            60% { clip-path: inset(10% 0 50% 0); filter: hue-rotate(270deg); }
            80% { clip-path: inset(0 10% 0 0); filter: hue-rotate(360deg); }
            100% { clip-path: inset(0); filter: hue-rotate(0deg); }
        }
        /* --- Smooth scroll --- */
        html {
            scroll-behavior: smooth;
        }
    </style>
</head>

<body>
    <div id="crt"></div>
    <div class="scanline"></div>
    <div id="custom-cursor"></div>
    <div id="custom-cursor-ring"></div>
    <canvas id="trace-canvas"></canvas>
    <canvas id="particles-canvas"></canvas>
    <div id="fl"></div>
    <div id="root"></div>

    <script>
        /* === Custom Cursor Logic === */
        (function() {
            var c = document.getElementById('custom-cursor');
            var r = document.getElementById('custom-cursor-ring');
            var mouseX = window.innerWidth/2, mouseY = window.innerHeight/2;
            var ringX = mouseX, ringY = mouseY;
            document.addEventListener('mousemove', function(e) {
                mouseX = e.clientX; mouseY = e.clientY;
                c.style.transform = 'translate(' + (mouseX-3) + 'px, ' + (mouseY-3) + 'px)';
            });
            function anim() {
                ringX += (mouseX - ringX) * 0.2;
                ringY += (mouseY - ringY) * 0.2;
                r.style.transform = 'translate(' + ringX + 'px, ' + ringY + 'px) translate(-50%, -50%)';
                requestAnimationFrame(anim);
            }
            requestAnimationFrame(anim);
        })();
            /* ======================================== */
            /* === PARTICLE BACKGROUND (Canvas) === */
            /* ======================================== */
            (function () {
                var canvas = document.getElementById('particles-canvas');
                var ctx = canvas.getContext('2d');
                var particles = [];
                var mouse = { x: -999, y: -999 };
                var W, H;

                function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
                resize();
                window.addEventListener('resize', resize);
                document.addEventListener('mousemove', function (ev) { mouse.x = ev.clientX; mouse.y = ev.clientY; });

                for (var i = 0; i < 60; i++) {
                    particles.push({
                        x: Math.random() * W, y: Math.random() * H,
                        vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3,
                        r: 1 + Math.random() * 1.5, a: 0.1 + Math.random() * 0.2
                    });
                }

                function draw() {
                    ctx.clearRect(0, 0, W, H);
                    for (var i = 0; i < particles.length; i++) {
                        var p = particles[i];
                        p.x += p.vx; p.y += p.vy;
                        if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
                        if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;

                        /* Glow near mouse */
                        var dx = p.x - mouse.x, dy = p.y - mouse.y;
                        var dist = Math.sqrt(dx * dx + dy * dy);
                        var alpha = dist < 200 ? p.a + (1 - dist / 200) * 0.5 : p.a;

                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                        ctx.fillStyle = 'rgba(0,243,255,' + alpha + ')';
                        ctx.fill();

                        /* Connect lines to nearby */
                        for (var j = i + 1; j < particles.length; j++) {
                            var p2 = particles[j];
                            var d = Math.sqrt((p.x - p2.x) * (p.x - p2.x) + (p.y - p2.y) * (p.y - p2.y));
                            if (d < 120) {
                                ctx.beginPath();
                                ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y);
                                ctx.strokeStyle = 'rgba(0,243,255,' + (0.06 * (1 - d / 120)) + ')';
                                ctx.stroke();
                            }
                        }
                    }
                    requestAnimationFrame(draw);
                }
                draw();
            })();

        /* ======================================== */
        /* === SOUND ENGINE (Web Audio API) === */
        /* ======================================== */
        var SFX = (function () {
            var actx = null;
            function init() { if (!actx) { try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { } } }
            document.addEventListener('click', init, { once: true });
            document.addEventListener('mousemove', init, { once: true });

            function play(freq, dur, type, vol) {
                if (!actx) return;
                var osc = actx.createOscillator();
                var gain = actx.createGain();
                osc.type = type || 'sine';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(vol || 0.06, actx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + (dur || 0.15));
                osc.connect(gain); gain.connect(actx.destination);
                osc.start(); osc.stop(actx.currentTime + (dur || 0.15));
            }

            return {
                hover: function () { play(1200, 0.08, 'sine', 0.04); },
                click: function () { play(800, 0.1, 'square', 0.05); play(1600, 0.15, 'sine', 0.03); },
                success: function () { play(523, 0.15, 'sine', 0.08); setTimeout(function () { play(659, 0.15, 'sine', 0.08); }, 100); setTimeout(function () { play(784, 0.2, 'sine', 0.08); }, 200); },
                error: function () { play(200, 0.3, 'sawtooth', 0.06); },
                type: function () { play(600 + Math.random() * 400, 0.04, 'square', 0.02); },
                glitch: function () { play(100, 0.05, 'sawtooth', 0.08); play(800, 0.05, 'square', 0.04); }
            };
        })();

        /* ======================================== */
        /* === MOUSE TRACE (Canvas) === */
        /* ======================================== */
        (function() {
            var canvas = document.getElementById('trace-canvas');
            var ctx = canvas.getContext('2d');
            var points = [];
            var maxPoints = 25;

            function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            resize();
            window.addEventListener('resize', resize);

            document.addEventListener('mousemove', function(e) {
                points.push({ x: e.clientX, y: e.clientY, age: 0 });
            });

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                if (points.length > 1) {
                    ctx.beginPath();
                    ctx.moveTo(points[0].x, points[0].y);
                    for (var i = 1; i < points.length; i++) {
                        ctx.lineTo(points[i].x, points[i].y);
                    }
                    ctx.strokeStyle = 'rgba(0, 243, 255, 0.4)';
                    ctx.lineWidth = 2;
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = '#00f3ff';
                    ctx.stroke();
                }

                for (var i = 0; i < points.length; i++) {
